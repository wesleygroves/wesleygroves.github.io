                <div>
                <img src="gif/mtnflckr.gif" alt="Looping distressed footage from yellowstone home movie. A flash of a steep grade garnished with a few solarized trees. Intermittent flickering of high contrast rock faces.">
                </div>
                <div>
                <img src="gif/crtdv.gif" alt="From a prior era: a camera pointed at a CRT in the closing days of analogue TV broadcast. Two cuts of highly zoomed faces, cropped below the eyes, likely from a telenovela. The loop repeats at a cascading horizontal artifact from previously recorded footage on the original MiniDV tape.">
                </div>
                <div>
                <img src="gif/lakeslide.gif" alt="Pure glitch aided by Signal Culture apps. Highly pixellated scene of pine trees to the left and lake to the right on a sunny day get wiped left to right. In the wake is a rippling and banding of cells of bold colours.">
                </div>
                <div>
                <img src="gif/rflct3.gif" alt="The rippling of sky above and trees below, as reflected in the Humboldt Park lagoon in Chicago IL.">
                </div>
                <div>
                <img src="gif/cputape.gif" alt="Proper Audacity glitch of 1960s vintage computer footage. Up close shots are of a magnetic tape machine; a hand pressing play on a tape machine; a hand flipping a switch on a computer control panel. Glitches form like fractures: red, magenta, blue, cyan.">
                </div>
                <div>
                <img src="gif/thinsect.gif" alt="Beautiful SD traditional mineral thin section footage. What rock is this? Schist? Taken at Columbia College Chicago, moons ago.">
                </div>
